services:
  lager:
    build: .
    container_name: kda_lager
    environment:
      - DATA_DIR=/data
      - APP_PORT=8080
      # Optional: set these from CI/build system
      - APP_VERSION=0.1.13
      - APP_BUILD=${APP_BUILD:-dev}
      - GIT_SHA=${GIT_SHA:-local}
      - BUILD_DATE=${BUILD_DATE:-}
    expose:
      - "8080"
    volumes:
      - ./data:/data
    restart: unless-stopped

  proxy:
    image: caddy:2-alpine
    container_name: kda_lager_proxy
    depends_on:
      - lager
    ports:
      - "${HTTP_PORT:-8080}:80"
      - "${HTTPS_PORT:-8443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
