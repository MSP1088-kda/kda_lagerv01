{% extends "base.html" %}
{% block content %}
<div class="panel">
  {% import "macros/forms.html" as f %}
  {% set fd = form_data or {} %}
  {% set fe = form_errors or {} %}
  <h1>{{ page_title }}</h1>
  {{ f.render_errors(fe) }}
  <div class="box"><div class="box-body">{{ customer.customer_no_internal }} | {{ party.display_name }}</div></div>
  <form method="post" action="{{ form_action }}" class="form" style="margin-top:10px;">
    <div class="grid3">
      <div>
        <label for="crm_task_entry_type">Typ</label>
        <select id="crm_task_entry_type" name="entry_type">
          {% for item in entry_type_choices %}
            <option value="{{ item }}" {% if f.old(fd, 'entry_type', 'task') == item %}selected{% endif %}>{{ crm_task_entry_type_label(item) }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label for="crm_task_status">Status</label>
        <select id="crm_task_status" name="status">
          {% for item in task_status_choices %}
            <option value="{{ item }}" {% if f.old(fd, 'status', 'open') == item %}selected{% endif %}>{{ crm_task_status_label(item) }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label for="crm_task_due_at">Faelligkeit</label>
        <input id="crm_task_due_at" type="datetime-local" name="due_at" value="{{ f.old(fd, 'due_at', '') }}">
      </div>
      <div>
        <label for="crm_task_assigned_user_id">Zustaendig</label>
        <select id="crm_task_assigned_user_id" name="assigned_user_id">
          <option value="0">Nicht zugewiesen</option>
          {% for item in user_options %}
            <option value="{{ item.id }}" {% if f.old(fd, 'assigned_user_id', '0') == item.id|string %}selected{% endif %}>{{ item.email }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label for="crm_task_service_location_id">Leistungsort</label>
        <select id="crm_task_service_location_id" name="service_location_id">
          <option value="0">Kein Leistungsort</option>
          {% for item in location_options %}
            <option value="{{ item.id }}" {% if f.old(fd, 'service_location_id', '0') == item.id|string %}selected{% endif %}>{{ item.label }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label for="crm_task_title">Titel</label>
        <input id="crm_task_title" type="text" name="title" value="{{ f.old(fd, 'title', '') }}" required>
      </div>
    </div>
    <label for="crm_task_body">Inhalt</label>
    <textarea id="crm_task_body" name="body" rows="6">{{ f.old(fd, 'body', '') }}</textarea>
    <div class="row" style="margin-top:10px; gap:8px;">
      <button class="btn primary" type="submit">Speichern</button>
      <a class="btn" href="/crm/kunden/{{ customer.id }}">Zurueck</a>
    </div>
  </form>
</div>
{% endblock %}
