{% extends "base.html" %}
{% block content %}
<div class="panel">
  <h1>CSV-Import V2</h1>
  <form method="post" action="/catalog/products/import/preview" enctype="multipart/form-data" class="form" data-import-upload-form="1">
    <label>Hersteller (Pflicht)</label>
    <select name="manufacturer_id" required>
      <option value="0">Bitte wählen</option>
      {% for m in manufacturers %}
      <option value="{{ m.id }}" {% if selected_manufacturer_id == m.id %}selected{% endif %}>{{ m.name }}</option>
      {% endfor %}
    </select>

    <label>Geräteart (Pflicht)</label>
    <select name="kind_id" required>
      <option value="0">Bitte wählen</option>
      {% for k in kinds %}
      <option value="{{ k.id }}" {% if selected_kind_id == k.id %}selected{% endif %}>{{ k.name }}</option>
      {% endfor %}
    </select>

    <label>CSV-Datei</label>
    <input type="file" name="csv_file" accept=".csv,text/csv" required>

    <div class="grid3">
      <div>
        <label>Trennzeichen</label>
        <select name="delimiter">
          <option value=";" selected>Semikolon (;)</option>
          <option value=",">Komma (,)</option>
        </select>
      </div>
      <div>
        <label>Encoding</label>
        <select name="encoding">
          <option value="utf-8" selected>utf-8</option>
          <option value="utf-8-sig">utf-8-sig</option>
          <option value="cp1252">cp1252</option>
          <option value="latin-1">latin-1</option>
        </select>
      </div>
      <div>
        <label class="check"><input type="checkbox" name="has_header" checked> Erste Zeile enthält Header</label>
      </div>
    </div>

    <div class="row">
      <button class="btn primary" type="submit">Vorschau öffnen</button>
      <a class="btn" href="/catalog/products">Zurück</a>
    </div>
  </form>
</div>
{% endblock %}

{% block help %}
<ul>
  <li>Wähle zuerst Hersteller und Geräteart.</li>
  <li>Nach dem Upload erkennt das System passende Import-Profile automatisch.</li>
  <li>Vor dem Schreiben wird immer eine Vorschau angezeigt.</li>
</ul>
{% endblock %}
