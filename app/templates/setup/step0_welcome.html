{% extends "base.html" %}
{% block content %}
<div class="panel">
  <h1>Erstinstallation</h1>
  <p>Diese Instanz ist noch nicht eingerichtet. Keine Panik, das ist normal (für frische Installationen).</p>

  <form method="post" action="/setup/0" class="form">
    <label>Wie möchtest du starten?</label>
    <div class="row">
      <label class="radio">
        <input type="radio" name="mode" value="restore" checked>
        Backup wiederherstellen
      </label>
      <label class="radio">
        <input type="radio" name="mode" value="new">
        Neu einrichten
      </label>
    </div>

    <div class="row">
      <button type="submit" class="btn primary">Weiter [Enter]</button>
    </div>
  </form>

  <div class="hint">
    Tipp: Du kannst später immer noch Backups ziehen und wiederherstellen. Menschen machen trotzdem selten welche.
  </div>
</div>
{% endblock %}
